name: revolut

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: revolut-api:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - ${REVOLUT_ENV_FILE:-/etc/revolut/revolut.env}
    environment:
      NODE_ENV: production
      REVOLUT_MODE: mock
    ports:
      - "127.0.0.1:3000:3000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
